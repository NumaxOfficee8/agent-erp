name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # For Apple Silicon and Intel macOS
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest" # For Windows x64
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: sync version from git tag
        run: |
          node -e '
            const fs = require("fs");
            const tag = process.env.GITHUB_REF_NAME || "v0.0.0";
            const version = tag.replace(/^refs\/tags\/v/, "").replace(/^v/, "");
            
            // Sync tauri.conf.json
            const confPath = "src-tauri/tauri.conf.json";
            const conf = JSON.parse(fs.readFileSync(confPath, "utf8"));
            conf.version = version;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2));
            console.log("Synced " + confPath + " version to " + version);
            
            // Sync Cargo.toml
            const tomlPath = "src-tauri/Cargo.toml";
            let toml = fs.readFileSync(tomlPath, "utf8");
            toml = toml.replace(/^version\s*=\s*"[^"]+"/m, "version = \"" + version + "\"");
            fs.writeFileSync(tomlPath, toml);
            console.log("Synced " + tomlPath + " version to " + version);
          '

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # In Tauri v2 we build for targets specified in target args
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: npm ci

      - name: build Svelte frontend & Tauri shell
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AgentERP Shell ${{ github.ref_name }}"
          releaseBody: "Automated desktop package release for version ${{ github.ref_name }}. Contains Svelte 5 hot-reload dynamic module capabilities."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Octokit client
        run: npm install @octokit/rest

      - name: Generate update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/update-manifest.cjs

      - name: Deploy update.json to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save update.json in a safe place
          mv update.json ../update.json
          
          # Fetch and checkout gh-pages branch
          git fetch origin gh-pages || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
            git pull origin gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # Copy update.json back
          mv ../update.json update.json
          
          # Commit and push
          git add update.json
          git commit -m "docs: auto update manifest to $TAG_NAME" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages --force
